<svg viewBox="0 0 2732 2732" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0a1f14"/>
      <stop offset="55%" stop-color="#0a0d0a"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="30" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="2732" height="2732" fill="url(#bg)"/>

  <!-- 안개 동심원 -->
  <g transform="translate(1366 1250)" opacity="0.35">
    <circle r="900" fill="none" stroke="#21f56e" stroke-width="3" opacity="0.3"/>
    <circle r="700" fill="none" stroke="#21f56e" stroke-width="4" opacity="0.4"/>
    <circle r="500" fill="none" stroke="#21f56e" stroke-width="6" opacity="0.6"/>
  </g>

  <!-- 고스트 -->
  <g filter="url(#glow)" transform="translate(1366 1280)">
    <path d="
      M 0 -360
      C -250 -360 -430 -180 -430 70
      L -430 330
      L -335 265 L -235 330 L -145 265 L 0 330 L 145 265 L 235 330 L 335 265 L 430 330
      L 430 70
      C 430 -180 250 -360 0 -360 Z"
      fill="#ffffff" stroke="#21f56e" stroke-width="18" stroke-linejoin="round"/>
    <ellipse cx="-130" cy="-55" rx="42" ry="68" fill="#0a0d0a"/>
    <ellipse cx="130" cy="-55" rx="42" ry="68" fill="#0a0d0a"/>
    <circle cx="-128" cy="-42" r="11" fill="#21f56e"/>
    <circle cx="133" cy="-42" r="11" fill="#21f56e"/>
  </g>

  <!-- 하단 라벨 -->
  <text x="1366" y="2160"
        font-family="ui-monospace, Menlo, monospace"
        font-size="72" font-weight="900"
        letter-spacing="36"
        fill="#21f56e" text-anchor="middle">
    SHADOW HUNT
  </text>
  <text x="1366" y="2240"
        font-family="ui-monospace, monospace"
        font-size="28" fill="#15a749" text-anchor="middle" letter-spacing="8">
    ENTITY DETECTOR
  </text>
</svg>
