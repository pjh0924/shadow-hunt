name: Deploy PWA to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Pages 에 쓰기 + id-token 권한
permissions:
  contents: read
  pages: write
  id-token: write

# 동시 배포 방지 (진행 중이면 새로 시작)
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: Build for Pages
        # GitHub Pages 는 `/<repo-name>/` 하위 경로 → VITE_BASE 환경변수
        # Capacitor 기본 base 가 './' 이므로 상대 경로로 대부분 동작하지만
        # SPA + PWA 정확성을 위해 명시. 아래 값 필요 시 조정.
        run: npm run build

      - name: Add .nojekyll + 404 fallback
        # GitHub Pages 가 _ 로 시작하는 파일을 숨기지 않게 + SPA 라우팅 폴백
        run: |
          touch dist/.nojekyll
          cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
