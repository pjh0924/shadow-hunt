<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- 배경: 거의 블랙 + 미묘한 radial -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#0a1f14"/>
      <stop offset="60%" stop-color="#0a0d0a"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1024" height="1024" fill="url(#bg)"/>
  <!-- 외곽 네온 링 -->
  <circle cx="512" cy="512" r="460" fill="none" stroke="#21f56e" stroke-width="12" opacity="0.25"/>
  <circle cx="512" cy="512" r="420" fill="none" stroke="#21f56e" stroke-width="6" opacity="0.6"/>

  <!-- 고스트 몸체 (중앙) -->
  <g filter="url(#glow)" transform="translate(512 528)">
    <!-- glow 패스 (큰 흐릿한 복제) -->
    <path d="
      M 0 -260
      C -180 -260 -310 -130 -310 50
      L -310 240
      L -240 190 L -170 240 L -100 190 L 0 240 L 100 190 L 170 240 L 240 190 L 310 240
      L 310 50
      C 310 -130 180 -260 0 -260 Z"
      fill="#ffffff" stroke="#21f56e" stroke-width="14" stroke-linejoin="round"/>
    <!-- 눈 -->
    <ellipse cx="-92" cy="-40" rx="32" ry="50" fill="#0a0d0a"/>
    <ellipse cx="92" cy="-40" rx="32" ry="50" fill="#0a0d0a"/>
    <!-- 눈동자 (작은 네온 점) -->
    <circle cx="-90" cy="-30" r="8" fill="#21f56e"/>
    <circle cx="94" cy="-30" r="8" fill="#21f56e"/>
  </g>
</svg>
